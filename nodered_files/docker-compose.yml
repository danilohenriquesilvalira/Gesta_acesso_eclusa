version: '3.8'

services:
  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    restart: unless-stopped
    environment:
      - TZ=Europe/Lisbon
      - NODE_RED_ENABLE_PROJECTS=false
      - NODE_OPTIONS=--max-old-space-size=256
    ports:
      - "1880:1880"
    volumes:
      - ./data:/data
    networks:
      - gestao_acesso_net
    mem_limit: 512m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1880"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  gestao_acesso_net:
    external: true
    name: gestao-acessos-edp_gestao_acesso_net
