[package]
name = "wincc-api"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tower-http = { version = "0.5", features = ["cors"] }
chrono = "0.4"
rusqlite = { version = "0.31", features = ["bundled"] }
sha2 = "0.10"
windows     = { version = "0.58", features = ["Win32_System_RemoteDesktop", "Win32_Foundation"] }
tokio-stream = { version = "0.1", features = ["sync"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
