version: "3.9"

# ── Projecto NEXT — Servidor Linux ────────────────────────────────────────────
# Uso:
#   docker compose up -d --build    (primeira vez ou após mudanças)
#   docker compose up -d            (arranque normal)
#   docker compose down             (parar, dados preservados)
#   docker compose down -v          (parar + apagar dados)
#   docker compose logs -f api      (ver logs do backend)

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: next-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../infra/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - next-internal

  # ── Backend Rust ───────────────────────────────────────────────────────────
  api:
    build:
      context: ../wincc-api
      dockerfile: Dockerfile
    container_name: next-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL:  postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET:    ${JWT_SECRET}
      API_PORT:      8080
      RDP_USER:      ${RDP_USER:-Administrator}
      RDP_PASSWORD:  ${RDP_PASSWORD:-changeme}
      ECLUSAS_FILE:  /opt/next/data/eclusas.json
      SSH_KEY_PATH:  /etc/wincc-api/ssh_key
      SSH_PORT:      ${SSH_PORT:-22}
    volumes:
      - eclusas_data:/opt/next/data
      - ${SSH_KEY_FILE:-./ssh_key}:/etc/wincc-api/ssh_key:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - next-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  eclusas_data:

networks:
  next-internal:
    driver: bridge
